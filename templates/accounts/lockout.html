<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked | Tele CRM Security</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 400px; text-align: center; }
        h1 { color: #e11d48; margin-bottom: 1rem; }
        p { color: #475569; line-height: 1.5; }
        .timer { font-weight: bold; color: #1e293b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Account Locked</h1>
        <p>Multiple failed login attempts detected. For security reasons, your account access has been temporarily suspended.</p>
        <p>Please try again in <span class="timer">15 minutes</span> or contact your system administrator.</p>
    </div>
</body>
</html>
