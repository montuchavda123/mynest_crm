{% extends 'crm_ui/base.html' %}
{% load static %}

{% block title %}Password Reset Complete | MyNest CRM{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg text-center">
            <div class="card-body p-5">
                <div class="avatar-lg bg-success-subtle text-success rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 64px; height: 64px;">
                    <i class="fas fa-check-double fa-2x"></i>
                </div>
                <h3 class="fw-bold">Password Updated!</h3>
                <p class="text-muted mb-4">Your password has been successfully reset. You may now log in with your new credentials.</p>
                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg shadow-sm">Log In Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
