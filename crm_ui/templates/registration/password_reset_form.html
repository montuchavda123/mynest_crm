{% extends 'crm_ui/base.html' %}
{% load static %}

{% block title %}Reset Password | MyNest CRM{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="avatar-lg bg-primary-subtle text-primary rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 64px; height: 64px;">
                        <i class="fas fa-key fa-2x"></i>
                    </div>
                    <h3 class="fw-bold">Forgot Password?</h3>
                    <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Send Reset Link</button>
                        <a href="{% url 'login' %}" class="btn btn-link text-muted">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
